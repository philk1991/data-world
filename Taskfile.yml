version: '3'

vars:
  VENV: .venv/bin/activate
  DBT_DIR: dbt
  CACHE: data-ingestion/.spotify_cache

tasks:

  # ── Spotify Ingestion ────────────────────────────────────────────────────────

  ingest:
    desc: Clear Spotify cache and run the full ingest pipeline
    cmds:
      - rm -f {{.CACHE}}
      - bash -c "source {{.VENV}} && cd data-ingestion && python ingest.py"

  ingest:no-cache-clear:
    desc: Run ingest without clearing the Spotify cache (uses existing token)
    cmds:
      - bash -c "source {{.VENV}} && cd data-ingestion && python ingest.py"

  # ── dbt ─────────────────────────────────────────────────────────────────────

  dbt:run:
    desc: Run all dbt models
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt run"

  dbt:test:
    desc: Run all dbt tests
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt test"

  dbt:build:
    desc: Run all dbt models then test them
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt build"

  dbt:deps:
    desc: Install dbt packages (including elementary)
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt deps"

  dbt:elementary:init:
    desc: Materialise Elementary tracking tables in DuckDB (run once after dbt deps)
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt run --select elementary"

  edr:report:
    desc: Generate and open the Elementary observability report
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && edr report --profiles-dir . --project-dir . --open-browser true"

  dbt:docs:
    desc: Generate and serve dbt docs in the browser
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt docs generate && dbt docs serve"

  dbt:compile:
    desc: Compile dbt project (validates SQL without running)
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt compile"

  dbt:parse:
    desc: Parse dbt project and regenerate manifest.json (required after adding/renaming models)
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt parse --profiles-dir ."

  dbt:run:select:
    desc: "Run a specific dbt model -- usage: task dbt:run:select MODEL=top_tracks_enriched"
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt run --select {{.MODEL}}"
    requires:
      vars: [MODEL]

  dbt:test:select:
    desc: "Test a specific dbt model -- usage: task dbt:test:select MODEL=stg_top_tracks"
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt test --select {{.MODEL}}"
    requires:
      vars: [MODEL]

  # ── Dashboard ────────────────────────────────────────────────────────────────

  dashboard:install:
    desc: Install Spotify dashboard Node.js dependencies
    dir: dashboards/spotify
    cmds:
      - npm install

  dashboard:dev:
    desc: "Start the Spotify dashboard with hot reload (http://localhost:5173)"
    dir: dashboards/spotify
    cmds:
      - npm run dev

  dashboard:build:
    desc: Build the Spotify dashboard for production
    dir: dashboards/spotify
    cmds:
      - npm run build

  dashboard:start:
    desc: Run the built Spotify dashboard
    dir: dashboards/spotify
    cmds:
      - npm run preview

  # ── dbt Crypto ──────────────────────────────────────────────────────────────

  dbt:cryhe un:
    desc: Run all crypto dbt models (staging_crypto + OHLCV marts)
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt run --select staging.crypto+ marts.crypto+"

  dbt:crypto:test:
    desc: Run all crypto dbt tests
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt test --select staging.crypto+ marts.crypto+"

  dbt:crypto:build:
    desc: Run and test all crypto dbt models
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt build --select staging.crypto+ marts.crypto+"

  # ── Crypto Streaming ────────────────────────────────────────────────────────

  crypto:producer:
    desc: "Start the Binance WebSocket → Kafka producer (BTC/USDT, ETH/USDT)"
    cmds:
      - bash -c "source {{.VENV}} && cd data-ingestion && python -m crypto.producer"

  crypto:consumer:
    desc: "Start the Kafka → DuckDB consumer (raw_crypto.raw_trades)"
    cmds:
      - bash -c "source {{.VENV}} && cd data-ingestion && python -m crypto.consumer"

  # ── dbt Payments ──────────────────────────────────────────────────────────────

  dbt:payments:run:
    desc: Run all payments dbt models (staging_payments + payment marts)
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt run --select staging.payments+ marts.payments+"

  dbt:payments:test:
    desc: Run all payments dbt tests
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt test --select staging.payments+ marts.payments+"

  dbt:payments:build:
    desc: Run and test all payments dbt models
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt build --select staging.payments+ marts.payments+"

  # ── Payments Streaming ──────────────────────────────────────────────────────

  payments:producer:
    desc: "Start the synthetic payments → Kafka producer (payments.requests + payments.rejected)"
    cmds:
      - bash -c "source {{.VENV}} && cd data-ingestion && python -m payments.producer"

  payments:consumer:
    desc: "Start the Kafka → DuckDB consumer (raw_payments.raw_requests + raw_rejections)"
    cmds:
      - bash -c "source {{.VENV}} && cd data-ingestion && python -m payments.consumer"

  # ── Schema Migration ────────────────────────────────────────────────────────

  migrate:schemas:
    desc: Migrate existing DuckDB tables from main schema to raw_spotify / raw_statsbomb
    cmds:
      - bash -c "source {{.VENV}} && python scripts/migrate_schemas.py"

  # ── Crypto Dashboard ─────────────────────────────────────────────────────────

  dashboard:crypto:install:
    desc: Install crypto dashboard Node.js dependencies
    dir: dashboards/crypto
    cmds:
      - npm install

  dashboard:crypto:dev:
    desc: "Start the crypto dashboard with hot reload (http://localhost:5174)"
    dir: dashboards/crypto
    cmds:
      - npm run dev -- --port 5174

  dashboard:crypto:build:
    desc: Build the crypto dashboard for production
    dir: dashboards/crypto
    cmds:
      - npm run build

  # ── StatsBomb Ingestion ──────────────────────────────────────────────────────

  # ── Bomb Ingestion ───────────────────────────────────────────────────────

  ingest:statsbomb:
    desc: Run the StatsBomb open data ingest pipeline (incremental)
    cmds:
      - bash -c "source {{.VENV}} && cd data-ingestion && python ingest_statsbomb.py"

  # ── NBA Ingestion ─────────────────────────────────────────────────────────────

  ingest:nba:
    desc: Download the Kaggle NBA dataset (core + extended) and load into DuckDB
    cmds:
      - bash -c "source {{.VENV}} && cd data-ingestion && python ingest_nba.py"

  # ── OpenF1 Ingestion ──────────────────────────────────────────────────────────

  ingest:openf1:
    desc: "Ingest the OpenF1 season (meetings, sessions + per-session laps/pit/stints/weather/drivers)"
    cmds:
      - bash -c "source {{.VENV}} && cd data-ingestion && python ingest_openf1.py"

  # ── Dagster Orchestration ────────────────────────────────────────────────────

  dagster:dev:
    desc: "Start Dagster UI + daemon (http://localhost:3000)"
    cmds:
      - bash -c "source {{.VENV}} && DAGSTER_HOME=$(pwd)/orchestration dagster dev --module-name dagster_data_world"

  dagster:install:
    desc: Install the orchestration package into the venv (run once after adding deps)
    dir: orchestration
    cmds:
      - bash -c "source ../.venv/bin/activate && pip install -e . --quiet"

  # ── Combined ─────────────────────────────────────────────────────────────────

  refresh:
    desc: Full refresh — ingest from Spotify then build and test all dbt models
    cmds:
      - task: ingest
      - task: dbt:build

  refresh:statsbomb:
    desc: Ingest StatsBomb data then build and test all dbt models
    cmds:
      - task: ingest:statsbomb
      - task: dbt:build

  refresh:nba:
    desc: Ingest NBA data then build and test all dbt models
    cmds:
      - task: ingest:nba
      - task: dbt:build

  refresh:all:
    desc: Full refresh of all sources — Spotify + StatsBomb + NBA — then build all dbt models
    cmds:
      - task: ingest
      - task: ingest:statsbomb
      - task: ingest:nba
      - task: dbt:build

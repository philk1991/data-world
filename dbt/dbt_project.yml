name: spotify
version: '1.0.0'
config-version: 2

profile: spotify

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  spotify:
    staging:
      spotify:
        +materialized: view
        +schema: staging_spotify
      statsbomb:
        +materialized: view
        +schema: staging_statsbomb
      crypto:
        +materialized: view
        +schema: staging_crypto
    marts:
      spotify:
        +materialized: table
        +schema: marts
      statsbomb:
        +materialized: table
        +schema: marts
      crypto:
        +materialized: incremental
        +schema: marts
  elementary:
    +schema: elementary
    +materialized: table

vars:
  elementary:
    database_name: "spotify"

version: 2

models:
  - name: stg_top_artists
    description: >
      Staged top artists pulled from the Spotify API. Each row represents one
      artist at a specific time range (short_term, medium_term, long_term).
      Ranks are 1-indexed with 1 being the most listened to.
    columns:
      - name: artist_id
        description: Spotify artist ID.
        tests:
          - not_null
      - name: artist_name
        description: Display name of the artist.
        tests:
          - not_null
      - name: rank
        description: Rank within the given time range (1 = most listened).
        tests:
          - not_null
      - name: time_range
        description: Spotify time range window for the ranking.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["short_term", "medium_term", "long_term"]
      - name: popularity
        description: Spotify popularity score (0–100).
        tests:
          - not_null
      - name: followers
        description: Total number of Spotify followers for the artist.
        tests:
          - not_null
      - name: genres
        description: Comma-separated list of genres associated with the artist.
      - name: spotify_url
        description: External Spotify URL for the artist profile.
        tests:
          - not_null
      - name: image_url
        description: URL of the artist's profile image. May be null if no image is set.
      - name: ingested_at
        description: Timestamp when this record was ingested from the Spotify API.
        tests:
          - not_null

  - name: stg_top_tracks
    description: >
      Staged top tracks pulled from the Spotify API. Each row represents one
      track at a specific time range (short_term, medium_term, long_term).
      Album release dates are normalised to full dates — year-only and
      year-month values are defaulted to January 1st.
    columns:
      - name: track_id
        description: Spotify track ID.
        tests:
          - not_null
      - name: track_name
        description: Display name of the track.
        tests:
          - not_null
      - name: rank
        description: Rank within the given time range (1 = most listened).
        tests:
          - not_null
      - name: time_range
        description: Spotify time range window for the ranking.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["short_term", "medium_term", "long_term"]
      - name: artist_ids
        description: Comma-separated list of Spotify artist IDs for this track.
        tests:
          - not_null
      - name: artist_names
        description: Comma-separated list of artist names for this track.
        tests:
          - not_null
      - name: album_id
        description: Spotify album ID.
        tests:
          - not_null
      - name: album_name
        description: Name of the album this track belongs to.
        tests:
          - not_null
      - name: album_release_date
        description: >
          Release date of the album, normalised to a full date. Spotify may
          return year-only ("2001") or year-month ("2001-06") values, which
          are coerced to YYYY-01-01 and YYYY-MM-01 respectively.
      - name: duration_ms
        description: Track duration in milliseconds.
        tests:
          - not_null
      - name: duration_minutes
        description: Track duration in minutes, rounded to 2 decimal places.
        tests:
          - not_null
      - name: explicit
        description: Whether the track has explicit content.
        tests:
          - not_null
      - name: popularity
        description: Spotify popularity score (0–100).
        tests:
          - not_null
      - name: spotify_url
        description: External Spotify URL for the track.
        tests:
          - not_null
      - name: preview_url
        description: URL for a 30-second preview clip. May be null if unavailable.
      - name: ingested_at
        description: Timestamp when this record was ingested from the Spotify API.
        tests:
          - not_null

  - name: stg_recently_played
    description: >
      The 50 most recently played tracks for the user. Each row is a distinct
      play event identified by played_at. Includes derived date and hour columns
      for time-of-day analysis.
    columns:
      - name: played_at
        description: UTC timestamp of when the track was played. Unique per row.
        tests:
          - not_null
          - unique
      - name: played_date
        description: Calendar date the track was played (truncated to day).
        tests:
          - not_null
      - name: played_hour
        description: Hour of day the track was played (0–23).
        tests:
          - not_null
      - name: track_id
        description: Spotify track ID.
        tests:
          - not_null
      - name: track_name
        description: Display name of the track.
        tests:
          - not_null
      - name: artist_ids
        description: Comma-separated list of Spotify artist IDs.
        tests:
          - not_null
      - name: artist_names
        description: Comma-separated list of artist names.
        tests:
          - not_null
      - name: album_id
        description: Spotify album ID.
        tests:
          - not_null
      - name: album_name
        description: Name of the album.
        tests:
          - not_null
      - name: duration_ms
        description: Track duration in milliseconds.
        tests:
          - not_null
      - name: duration_minutes
        description: Track duration in minutes, rounded to 2 decimal places.
        tests:
          - not_null
      - name: explicit
        description: Whether the track has explicit content.
        tests:
          - not_null
      - name: popularity
        description: Spotify popularity score (0–100).
        tests:
          - not_null
      - name: spotify_url
        description: External Spotify URL for the track.
        tests:
          - not_null
      - name: context_type
        description: Type of context the track was played from (e.g. playlist, album, artist). May be null.
      - name: context_uri
        description: Spotify URI of the context (e.g. playlist URI). May be null.
      - name: ingested_at
        description: Timestamp when this record was ingested from the Spotify API.
        tests:
          - not_null

version: 2

models:
  - name: ohlcv_1m
    description: >
      OHLCV candlestick data at 1-minute resolution per trading pair.
      Incrementally built — each run appends new completed candles.
      open/close use the first/last trade price within the candle window.
    columns:
      - name: symbol
        description: Trading pair (e.g. BTCUSDT).
        tests:
          - not_null
      - name: candle_open_time
        description: UTC timestamp marking the start of the 1-minute candle. Natural key with symbol.
        tests:
          - not_null
      - name: open
        description: Price of the first trade in the candle window.
        tests:
          - not_null
      - name: high
        description: Highest trade price in the candle window.
        tests:
          - not_null
      - name: low
        description: Lowest trade price in the candle window.
        tests:
          - not_null
      - name: close
        description: Price of the last trade in the candle window.
        tests:
          - not_null
      - name: volume
        description: Total base asset volume traded in the candle window.
        tests:
          - not_null
      - name: notional_volume
        description: Total USD notional value traded in the candle window.
        tests:
          - not_null
      - name: trade_count
        description: Number of individual trades in the candle window.
        tests:
          - not_null

  - name: ohlcv_1h
    description: >
      OHLCV candlestick data at 1-hour resolution per trading pair.
      Rolled up from 1-minute candles for efficient long-range charting.
    columns:
      - name: symbol
        description: Trading pair (e.g. BTCUSDT).
        tests:
          - not_null
      - name: candle_open_time
        description: UTC timestamp marking the start of the 1-hour candle. Natural key with symbol.
        tests:
          - not_null
      - name: open
        description: Opening price of the hour (first 1m candle open).
        tests:
          - not_null
      - name: high
        description: Highest price within the hour.
        tests:
          - not_null
      - name: low
        description: Lowest price within the hour.
        tests:
          - not_null
      - name: close
        description: Closing price of the hour (last 1m candle close).
        tests:
          - not_null
      - name: volume
        description: Total base asset volume for the hour.
        tests:
          - not_null
      - name: notional_volume
        description: Total USD notional value for the hour.
        tests:
          - not_null
      - name: trade_count
        description: Total number of trades in the hour.
        tests:
          - not_null

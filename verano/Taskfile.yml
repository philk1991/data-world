version: '3'

# Verano learning-build tasks. Included into the root Taskfile under the
# `verano:` namespace, so run these as e.g. `task verano:gen:all`.
# Commands assume the working directory is the repo root (the main Taskfile's
# location), which is Task's default for included files.

vars:
  VENV: .venv/bin/activate
  GEN_DIR: verano/data-generation
  DBT_DIR: verano/dbt

tasks:

  # ── Layer 1: synthetic data generation → bronze ──────────────────────────────

  gen:all:
    desc: Generate all synthetic fashion data and land it in the bronze_* schemas
    cmds:
      - bash -c "source {{.VENV}} && cd {{.GEN_DIR}} && python generate.py"

  gen:profile:
    desc: Print a sanity summary of the generated bronze data (counts, ratios, spikes)
    cmds:
      - bash -c "source {{.VENV}} && cd {{.GEN_DIR}} && python profile.py"

  # ── Layers 2–3: dbt (silver → identity → gold) ───────────────────────────────

  dbt:debug:
    desc: Check the dbt project can connect to verano.duckdb
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt debug"

  dbt:build:
    desc: Run then test all dbt models (silver, identity, gold)
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt build"

  dbt:run:
    desc: Run all dbt models without testing
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt run"

  dbt:test:
    desc: Run all dbt tests
    cmds:
      - bash -c "source {{.VENV}} && cd {{.DBT_DIR}} && dbt test"

  # ── Layer 3: identity resolution ─────────────────────────────────────────────

  identity:eval:
    desc: Score identity resolution (bridge + graph) against the hidden ground truth
    cmds:
      - bash -c "source {{.VENV}} && python verano/eval/identity_eval.py"

  # ── Layer 4: ML modules ──────────────────────────────────────────────────────

  ml:popularity:
    desc: "ML 1/6 — popularity & trending (cold-start fallback)"
    cmds:
      - bash -c "source {{.VENV}} && cd verano/ml && python popularity.py"

  ml:copurchase:
    desc: "ML 2/6 — item-item co-purchase (customers also bought)"
    cmds:
      - bash -c "source {{.VENV}} && cd verano/ml && python co_purchase.py"

  ml:cf:
    desc: "ML 3/6 — collaborative filtering (matrix factorisation)"
    cmds:
      - bash -c "source {{.VENV}} && cd verano/ml && python collaborative.py"

  ml:propensity:
    desc: "ML 4/6 — purchase propensity (logistic regression)"
    cmds:
      - bash -c "source {{.VENV}} && cd verano/ml && python propensity.py"

  ml:embeddings:
    desc: "ML 5/6 — product & customer embeddings"
    cmds:
      - bash -c "source {{.VENV}} && cd verano/ml && python embeddings.py"

  ml:ranking:
    desc: "ML 6/6 — blended ranking / re-ranking"
    cmds:
      - bash -c "source {{.VENV}} && cd verano/ml && python ranking.py"

  ml:all:
    desc: Run all six ML modules in order
    cmds:
      - task: ml:popularity
      - task: ml:copurchase
      - task: ml:cf
      - task: ml:propensity
      - task: ml:embeddings
      - task: ml:ranking

  # ── Layer 5: serving ─────────────────────────────────────────────────────────

  serve:
    desc: Start the Verano personalisation API (http://localhost:8000/docs)
    cmds:
      - bash -c "source {{.VENV}} && cd verano/serving && uvicorn app:app --reload --port 8000"

  # ── End-to-end refresh ───────────────────────────────────────────────────────

  refresh:
    desc: Regenerate bronze then rebuild all dbt models
    cmds:
      - task: gen:all
      - task: dbt:build
